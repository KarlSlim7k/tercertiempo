<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920" />
<title>Final de Ida · Starting Soon · Tercer Tiempo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b1220; --paper:#050912; --paper-2:#0b1220;
    --gold:#e6b54a; --gold-2:#c8941f; --gold-soft:rgba(230,181,74,0.12);
    --green:#5fd28b; --cream:#f5f1e8; --dim:#dad5c8; --dimmer:#b8b2a3;
    --line:rgba(245,241,232,0.14); --line-2:rgba(245,241,232,0.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{font-family:"Inter",Arial,Helvetica,sans-serif}

  .stage{
    width:1920px;height:1080px;position:relative;overflow:hidden;
    background:
      radial-gradient(1400px 800px at 50% -10%, rgba(230,181,74,0.14), transparent 60%),
      radial-gradient(1000px 600px at 100% 100%, rgba(30,60,120,0.20), transparent 60%),
      radial-gradient(1000px 600px at 0% 100%, rgba(30,60,120,0.14), transparent 60%),
      linear-gradient(180deg, #0b1220 0%, #050912 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--cream);
  }

  /* ---- animated backdrop: drifting diagonal lines + soft orbs ---- */
  .bg-lines{position:absolute;inset:0;z-index:0;opacity:.5;pointer-events:none;
    background-image:repeating-linear-gradient(115deg, rgba(230,181,74,0.05) 0px, rgba(230,181,74,0.05) 1px, transparent 1px, transparent 68px);
    animation:drift 26s linear infinite;
  }
  @keyframes drift{
    0%{transform:translate3d(0,0,0)}
    100%{transform:translate3d(-136px,68px,0)}
  }
  .orb{position:absolute;border-radius:50%;filter:blur(2px);pointer-events:none;z-index:0}
  .orb-a{width:520px;height:520px;left:-160px;top:-160px;background:radial-gradient(circle at 30% 30%, rgba(230,181,74,0.14), transparent 70%);animation:float-a 14s ease-in-out infinite}
  .orb-b{width:620px;height:620px;right:-200px;bottom:-220px;background:radial-gradient(circle at 60% 40%, rgba(95,210,139,0.10), transparent 70%);animation:float-b 18s ease-in-out infinite}
  @keyframes float-a{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,40px)}}
  @keyframes float-b{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-30px)}}

  .particles{position:absolute;inset:0;z-index:0;pointer-events:none}
  .particle{position:absolute;border-radius:50%;background:var(--gold);opacity:.35;animation:rise linear infinite}
  @keyframes rise{
    0%{transform:translateY(0);opacity:0}
    10%{opacity:.5}
    90%{opacity:.25}
    100%{transform:translateY(-1080px);opacity:0}
  }

  /* ---- top bar / branding ---- */
  .topbar{position:absolute;top:0;left:0;right:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:34px 64px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(11,18,32,0.75), rgba(11,18,32,0));
  }
  .brand{display:flex;align-items:center;gap:22px}
  .logo-box{background:#fff;border-radius:8px;padding:10px 16px;display:flex;align-items:center;justify-content:center;height:72px;box-shadow:0 4px 20px rgba(0,0,0,0.35)}
  .logo-box img{height:52px;width:auto;display:block}
  .brand-text .kicker{font-family:"Oswald",sans-serif;font-size:15px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .brand-text .title{font-family:"Oswald",sans-serif;font-size:26px;font-weight:700;letter-spacing:.03em;color:var(--cream);margin-top:4px}

  .live-badge{display:flex;align-items:center;gap:12px;padding:12px 22px;border:1px solid var(--line-2);border-radius:999px;background:rgba(255,255,255,0.04)}
  .live-dot{width:12px;height:12px;border-radius:50%;background:var(--red,#ff7676);box-shadow:0 0 0 0 rgba(255,118,118,0.6);animation:pulse-dot 1.6s ease-out infinite}
  @keyframes pulse-dot{
    0%{box-shadow:0 0 0 0 rgba(255,118,118,0.55)}
    70%{box-shadow:0 0 0 14px rgba(255,118,118,0)}
    100%{box-shadow:0 0 0 0 rgba(255,118,118,0)}
  }
  .live-badge span{font-family:"Oswald",sans-serif;font-size:16px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:600}

  /* ---- center content ---- */
  .center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0}

  .ring{position:absolute;border-radius:50%;border:1px solid rgba(230,181,74,0.14);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:ring-pulse 5s ease-in-out infinite}
  .ring-1{width:560px;height:560px}
  .ring-2{width:760px;height:760px;animation-delay:.6s;border-color:rgba(230,181,74,0.08)}
  .ring-3{width:960px;height:960px;animation-delay:1.2s;border-color:rgba(230,181,74,0.05)}
  @keyframes ring-pulse{
    0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.03)}
  }

  .eyebrow{font-family:"Oswald",sans-serif;font-size:20px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:22px;
    text-shadow:0 0 24px rgba(230,181,74,0.35);animation:glow 3s ease-in-out infinite}
  @keyframes glow{
    0%,100%{opacity:.85;text-shadow:0 0 18px rgba(230,181,74,0.25)}
    50%{opacity:1;text-shadow:0 0 34px rgba(230,181,74,0.55)}
  }

  h1{font-family:"Oswald",sans-serif;font-weight:700;font-size:108px;line-height:.95;text-transform:uppercase;letter-spacing:.02em;
    color:var(--cream);text-shadow:0 6px 40px rgba(0,0,0,0.55);margin-bottom:22px}
  h1 .accent{color:var(--gold)}

  .rule{width:220px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:6px auto 26px}

  .subtitle{font-family:"Inter",sans-serif;font-size:32px;font-weight:500;color:var(--dim);max-width:1100px;line-height:1.4;margin-bottom:64px}
  .subtitle strong{color:var(--cream);font-weight:700}

  /* ---- countdown ---- */
  .countdown{display:flex;align-items:stretch;gap:28px}
  .unit{display:flex;flex-direction:column;align-items:center;min-width:150px;padding:22px 10px 18px;
    border:1px solid var(--line-2);border-radius:14px;background:rgba(255,255,255,0.035);
    box-shadow:0 10px 30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);position:relative;overflow:hidden}
  .unit::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}
  .unit .num{font-family:"Oswald",sans-serif;font-weight:700;font-size:84px;color:var(--cream);font-variant-numeric:tabular-nums;letter-spacing:.02em;
    text-shadow:0 0 26px rgba(230,181,74,0.25)}
  .unit .lbl{font-family:"Oswald",sans-serif;font-size:15px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer);margin-top:8px;font-weight:600}
  .sep{font-family:"Oswald",sans-serif;font-weight:700;font-size:64px;color:var(--gold-2);align-self:center;opacity:.6;padding-bottom:26px}

  .live-now{display:none;font-family:"Oswald",sans-serif;font-weight:700;font-size:64px;letter-spacing:.08em;color:var(--green);text-transform:uppercase;
    text-shadow:0 0 40px rgba(95,210,139,0.5);animation:glow 1.6s ease-in-out infinite}

  /* ---- footer strip ---- */
  .footer{position:absolute;bottom:0;left:0;right:0;z-index:2;display:flex;align-items:center;justify-content:space-between;
    padding:26px 64px;border-top:1px solid var(--line);background:linear-gradient(0deg, rgba(11,18,32,0.75), rgba(11,18,32,0))}
  .footer .fdate{font-family:"Oswald",sans-serif;font-size:17px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}
  .footer .fcredit{font-family:"Inter",sans-serif;font-size:15px;color:var(--dimmer)}
  .footer .fcredit b{color:var(--dim)}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="bg-lines"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="particles" id="particles"></div>

    <div class="topbar">
      <div class="brand">
        <div class="logo-box"><img id="logoTT" alt="Tercer Tiempo"></div>
        <div class="brand-text">
          <div class="kicker">Tercer Tiempo</div>
          <div class="title">Primera Fuerza Especial</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:22px">
        <div class="live-badge"><span class="live-dot"></span><span>En vivo en breve</span></div>
        <div class="logo-box"><img id="logoCrea" alt="CREA Contenidos"></div>
      </div>
    </div>

    <div class="center">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>

      <div class="eyebrow">Transmisión en vivo</div>
      <h1>EN MOMENTOS <span class="accent">COMENZAMOS</span></h1>
      <div class="rule"></div>
      <div class="subtitle"><strong>Final de Ida</strong> &middot; Liga Primera Fuerza Especial</div>

      <div class="countdown" id="countdown">
        <div class="unit"><div class="num" id="d">00</div><div class="lbl">Días</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num" id="h">00</div><div class="lbl">Horas</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num" id="m">00</div><div class="lbl">Min</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num" id="s">00</div><div class="lbl">Seg</div></div>
      </div>
      <div class="live-now" id="liveNow">¡Ya estamos en vivo!</div>
    </div>

    <div class="footer">
      <div class="fdate" id="matchDate">&nbsp;</div>
      <div class="fcredit">Producido por <b>Tercer Tiempo</b> &amp; <b>CREA Contenidos</b></div>
    </div>
  </div>

<script>
  // ------------------------------------------------------------------
  // Hora de inicio del partido. Editar esta línea para cada transmisión
  // (formato ISO 8601, con offset de zona horaria explícito).
  // También puede sobreescribirse por URL: ?kickoff=2026-07-26T12:00:00-06:00
  // ------------------------------------------------------------------
  const KICKOFF_DATETIME = '2026-07-26T12:00:00-06:00';

  const params = new URLSearchParams(location.search);
  const kickoffParam = params.get('kickoff');
  const kickoff = new Date(kickoffParam || KICKOFF_DATETIME);

  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const countdownEl = document.getElementById('countdown');
  const liveNowEl = document.getElementById('liveNow');
  const matchDateEl = document.getElementById('matchDate');

  function pad(n){ return String(n).padStart(2, '0'); }

  const fmt = new Intl.DateTimeFormat('es-MX', {
    weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
  });
  if (!isNaN(kickoff.getTime())) {
    matchDateEl.textContent = fmt.format(kickoff);
  }

  function tick() {
    const now = new Date();
    let diff = kickoff.getTime() - now.getTime();

    if (isNaN(kickoff.getTime()) || diff <= 0) {
      countdownEl.style.display = 'none';
      liveNowEl.style.display = 'block';
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    dEl.textContent = pad(days);
    hEl.textContent = pad(hours);
    mEl.textContent = pad(minutes);
    sEl.textContent = pad(seconds);
  }
  tick();
  setInterval(tick, 1000);

  // ---- subtle floating particles (lightweight, CSS-driven) ----
  const particleHost = document.getElementById('particles');
  const PARTICLE_COUNT = 22;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 3;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.animationDuration = (10 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 14) + 's';
    particleHost.appendChild(p);
  }

  // ---- logos (embedded as base64 so this file works standalone) ----

  // ---- scale-to-fit: guarantees full-bleed 1920x1080 in any container size ----
  function fit() {
    const stage = document.getElementById('stage');
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const s = Math.min(sx, sy);
    stage.style.transformOrigin = 'top left';
    stage.style.position = 'absolute';
    stage.style.transform = 'scale(' + s + ')';
    const w = 1920 * s, h = 1080 * s;
    stage.style.left = ((window.innerWidth - w) / 2) + 'px';
    stage.style.top = ((window.innerHeight - h) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();
